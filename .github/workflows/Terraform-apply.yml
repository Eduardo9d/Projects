name: Terraform Apply

on:
  push:
    branches: [ main ]

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
    - name: Terraform Init
      run: |
        cd Terraform
        terraform init
    - name: Terraform Plan
      run: |
        cd Terraform
        terraform plan
    - name: Terraform Apply
      run: |
        cd Terraform
 #       terraform apply -auto-approve